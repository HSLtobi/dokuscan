name: Deploy to Pi

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, pi]

    steps:
      - name: Code aktualisieren
        run: |
          cd /home/pi/dokuscan
          git pull origin main

      - name: Abhängigkeiten installieren
        run: |
          cd /home/pi/dokuscan
          npm install --omit=dev

      - name: Dienste neu starten
        run: |
          sudo systemctl restart dokuscan
          sudo systemctl restart dokuscan-web
          sleep 3
          systemctl is-active dokuscan
          systemctl is-active dokuscan-web

<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DokuScan Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Mono', 'Courier New', monospace; background: #080808; color: #e8e4dc; min-height: 100vh; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    .btn { cursor: pointer; transition: opacity .15s; border: none; background: none; font-family: inherit; color: inherit; }
    .btn:hover { opacity: .6; }
    .pill { cursor: pointer; transition: background .1s; }
    .pill:hover { background: #111 !important; }
    .tab { cursor: pointer; transition: all .15s; }
    .fade-in { animation: fi .3s ease; }
    @keyframes fi { from { opacity:0; transform:translateY(5px); } to { opacity:1; } }
    .spin { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .doc-row:hover { background: #0f0f0f !important; }

    select, input {
      background: #0f0f0f; border: 1px solid #1e1e1e; color: #e8e4dc;
      font-family: inherit; outline: none; border-radius: 5px;
    }
    select { cursor: pointer; }
  </style>
</head>
<body>

<div id="app"></div>

<script>
const CATEGORIES = {
  Rechnung:    { icon: "◈", color: "#f59e0b" },
  Vertrag:     { icon: "◉", color: "#3b82f6" },
  Kontoauszug: { icon: "◆", color: "#10b981" },
  Versicherung:{ icon: "◎", color: "#8b5cf6" },
  Brief:       { icon: "◇", color: "#ec4899" },
  Steuer:      { icon: "◑", color: "#ef4444" },
  Behoerde:    { icon: "▣", color: "#f97316" },
  Medizin:     { icon: "✦", color: "#06b6d4" },
  Sonstiges:   { icon: "◐", color: "#6b7280" },
};
const CAT_KEYS = Object.keys(CATEGORIES);

// ── State ─────────────────────────────────────────────────────────────────────
let state = {
  docs: [],
  pending: [],
  scannerActive: false,
  filter: "Alle",
  view: "liste",
  search: "",
  year: "",
};

function setState(patch) {
  Object.assign(state, patch);
  render();
}

// ── API ───────────────────────────────────────────────────────────────────────
async function loadDocs() {
  const [docsRes, pendRes, statusRes] = await Promise.all([
    fetch("/api/documents"), fetch("/api/pending"), fetch("/api/status")
  ]);
  const docs    = await docsRes.json();
  const pending = await pendRes.json();
  const status  = await statusRes.json();
  setState({ docs, pending, scannerActive: status.scanner === "active" });
}

// ── Filters ───────────────────────────────────────────────────────────────────
function getFiltered() {
  return state.docs.filter(d => {
    if (state.filter !== "Alle" && d.kategorie !== state.filter) return false;
    if (state.year && (!d.datum || !d.datum.startsWith(state.year))) return false;
    if (state.search.trim()) {
      const q = state.search.toLowerCase();
      if (!d.name.toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function getYears() {
  return [...new Set(state.docs.map(d => d.datum?.substring(0,4)).filter(Boolean))].sort((a,b)=>b-a);
}

function getCounts() {
  const c = { Alle: state.docs.length };
  for (const d of state.docs) c[d.kategorie] = (c[d.kategorie]||0) + 1;
  return c;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt(bytes) {
  if (bytes < 1024) return bytes + " B";
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + " KB";
  return (bytes/1048576).toFixed(1) + " MB";
}

// ── Render helpers ────────────────────────────────────────────────────────────
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === "style" && typeof v === "object") Object.assign(el.style, v);
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "className") el.className = v;
    else el.setAttribute(k, v);
  }
  for (const child of children.flat()) {
    if (child == null) continue;
    el.appendChild(typeof child === "string" ? document.createTextNode(child) : child);
  }
  return el;
}

// ── Components ────────────────────────────────────────────────────────────────

function StatBar() {
  const done  = state.docs.length;
  const busy  = state.pending.length;
  const pct   = done + busy > 0 ? Math.round(done / (done + busy) * 100) : 100;

  const item = (label, val, col) => h("div", { style: { display:"flex", gap:8, alignItems:"baseline" }},
    h("span", { style: { fontFamily:"Syne,sans-serif", fontSize:22, fontWeight:800, color:col }}, String(val)),
    h("span", { style: { fontSize:10, color:"#333", letterSpacing:1 }}, label.toUpperCase())
  );

  return h("div", { style: { display:"flex", gap:24, alignItems:"center", padding:"12px 28px", borderBottom:"1px solid #1a1a1a", background:"#080808" }},
    item("Archiviert", done, "#10b981"),
    item("In Eingang", busy, busy > 0 ? "#f59e0b" : "#333"),
    h("div", { style: { marginLeft:"auto", display:"flex", alignItems:"center", gap:10 }},
      h("div", { style: { width:120, height:3, background:"#1a1a1a", borderRadius:2 }},
        h("div", { style: { width:pct+"%", height:"100%", background:"#10b981", borderRadius:2, transition:"width .4s" }})
      ),
      h("span", { style: { fontSize:11, color:"#444" }}, pct + "%")
    )
  );
}

function Sidebar() {
  const counts = getCounts();
  const all = ["Alle", ...CAT_KEYS.filter(k => counts[k])];
  const wrap = h("div", { style: { paddingTop:16 }});
  h("div", { style: { padding:"0 16px 8px", fontSize:9, color:"#333", letterSpacing:2 }}, "KATEGORIEN").appendTo;
  wrap.appendChild(h("div", { style: { padding:"0 16px 8px", fontSize:9, color:"#333", letterSpacing:2 }}, "KATEGORIEN"));

  for (const cat of all) {
    const active = state.filter === cat;
    const info   = CATEGORIES[cat];
    const count  = counts[cat] || 0;
    const item   = h("div", {
      className: "pill",
      style: {
        padding:"7px 16px", display:"flex", alignItems:"center", gap:8,
        borderLeft: `2px solid ${active ? (info?.color||"#f59e0b") : "transparent"}`,
        background: active ? "#0f0f0f" : "none",
        color: active ? "#e8e4dc" : "#444", fontSize:12,
      },
      onClick: () => setState({ filter: cat })
    },
      h("span", { style:{ fontSize:13 }}, info?.icon || "◈"),
      h("span", { style:{ flex:1 }}, cat),
      count > 0 ? h("span", { style:{ fontSize:9, color: info?.color||"#f59e0b" }}, String(count)) : null
    );
    wrap.appendChild(item);
  }
  return wrap;
}

function DocRow(doc) {
  const info = CATEGORIES[doc.kategorie] || CATEGORIES.Sonstiges;

  const row = h("div", {
    className: "doc-row fade-in",
    style: {
      display:"grid", gridTemplateColumns:"22px 1fr 140px 100px 110px 90px",
      gap:10, padding:"10px 12px", alignItems:"center",
      borderBottom:"1px solid #141414",
    }
  },
    // Icon
    h("span", { style:{ fontSize:15, color:info.color }}, info.icon),
    // Name + Zusammenfassung
    h("div", { style:{ minWidth:0 }},
      h("div", { style:{ fontSize:12, color:"#e8e4dc", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}, doc.name),
      doc.zusammenfassung
        ? h("div", { style:{ fontSize:10, color:"#383838", marginTop:2, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}, doc.zusammenfassung)
        : h("div", { style:{ fontSize:10, color:"#2a2a2a", marginTop:2 }}, fmt(doc.size))
    ),
    // Absender
    h("div", { style:{ fontSize:11, color:"#444", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}, doc.absender || "—"),
    // Datum
    h("div", { style:{ fontSize:11, color:"#444" }}, doc.datum || "—"),
    // Betrag
    h("div", { style:{ fontSize:11, color: doc.betrag ? "#f59e0b" : "#2a2a2a" }}, doc.betrag || "—"),
    // Download
    h("a", { href:"/api/download/"+doc.id, style:{
      fontSize:11, color:"#444", textDecoration:"none", padding:"2px 4px"
    }, title:"Herunterladen"}, "⬇")
  );
  return row;
}

function FolderView(docs) {
  if (!docs.length) return h("div", { style:{padding:32, color:"#2a2a2a", fontSize:12, textAlign:"center"}}, "Keine Dokumente");
  const byKat = {};
  for (const d of docs) { (byKat[d.kategorie] = byKat[d.kategorie]||[]).push(d); }

  const wrap = h("div", { style:{ padding:"16px 20px", fontSize:11 }});
  for (const [kat, katDocs] of Object.entries(byKat)) {
    const info = CATEGORIES[kat]||CATEGORIES.Sonstiges;
    wrap.appendChild(h("div", { style:{ marginBottom:16 }},
      h("div", { style:{ display:"flex", alignItems:"center", gap:8, marginBottom:6, color:info.color }},
        h("span", {}, info.icon),
        h("span", { style:{ fontWeight:600, letterSpacing:.5 }}, kat),
        h("span", { style:{ color:"#333", fontSize:10 }}, "("+katDocs.length+")")
      ),
      ...katDocs.map(d =>
        h("div", { style:{ paddingLeft:20, paddingBottom:4, display:"flex", alignItems:"center", gap:8 }},
          h("span", { style:{ color:"#2a2a2a" }}, "└─"),
          h("a", { href:"/api/download/"+d.id, style:{ color:"#444", textDecoration:"none", fontSize:11 }}, d.name)
        )
      )
    ));
  }
  return wrap;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  const filtered = getFiltered();
  const years    = getYears();

  // ── HEADER
  const header = h("div", { style:{ display:"flex", alignItems:"center", padding:"16px 28px", borderBottom:"1px solid #141414" }},
    h("div", { style:{ fontFamily:"Syne,sans-serif", fontSize:20, fontWeight:800, letterSpacing:-.5 }},
      h("span", { style:{ color:"#f59e0b" }}, "DOKU"),
      document.createTextNode("SCAN "),
      h("span", { style:{ color:"#1f1f1f", fontSize:13, fontWeight:400 }}, "PRO")
    ),
    // Status dot
    h("div", { style:{ display:"flex", alignItems:"center", gap:6, marginLeft:24 }},
      h("div", { style:{
        width:7, height:7, borderRadius:"50%",
        background: state.scannerActive ? "#10b981" : "#444",
        boxShadow: state.scannerActive ? "0 0 6px #10b981" : "none"
      }}),
      h("span", { style:{ fontSize:11, color:"#444" }}, state.scannerActive ? "Scanner aktiv" : "Scanner inaktiv")
    ),
    // View toggle
    h("div", { style:{ marginLeft:28, display:"flex", gap:2, background:"#111", borderRadius:5, padding:2 }},
      ...([["liste","≡ Liste"],["ordner","⊞ Ordner"]]).map(([v,lbl]) =>
        h("button", {
          className:"tab",
          style:{ padding:"5px 14px", borderRadius:4, fontSize:11, border:"none", fontFamily:"inherit",
                  background: state.view===v ? "#1e1e1e" : "none", color: state.view===v ? "#e8e4dc" : "#444" },
          onClick: () => setState({ view: v })
        }, lbl)
      )
    ),
    // Right: SMB path
    h("div", { style:{ marginLeft:"auto", fontSize:10, color:"#2a2a2a" }}, "\\\\dokubt.local\\Scanner")
  );

  // ── STAT BAR
  const statBar = StatBar();

  // ── LAYOUT
  const sidebar = h("div", { style:{ width:200, borderRight:"1px solid #141414", overflowY:"auto", flexShrink:0 }},
    Sidebar()
  );

  // ── MAIN
  // Toolbar
  const searchInput = h("input", {
    type:"text", placeholder:"Suche nach Name…",
    style:{ flex:1, fontSize:11, padding:"7px 10px 7px 28px" },
    value: state.search
  });
  searchInput.value = state.search;
  searchInput.addEventListener("input", e => setState({ search: e.target.value }));

  const searchWrap = h("div", { style:{ flex:1, position:"relative" }},
    h("span", { style:{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", color:"#333", fontSize:13, pointerEvents:"none" }}, "⌕"),
    searchInput
  );

  const yearSel = h("select", { style:{ fontSize:11, padding:"7px 10px" },
    onChange: e => setState({ year: e.target.value }) },
    h("option", { value:"" }, "Alle Jahre"),
    ...years.map(y => {
      const opt = h("option", { value:y }, y);
      if (y === state.year) opt.selected = true;
      return opt;
    })
  );

  const toolbar = h("div", { style:{ display:"flex", gap:10, padding:"12px 20px", alignItems:"center", borderBottom:"1px solid #141414" }},
    searchWrap, yearSel,
    h("span", { style:{ fontSize:10, color:"#444", whiteSpace:"nowrap" }}, filtered.length+" Dokumente")
  );

  // Pending banner
  let pendingBanner = null;
  if (state.pending.length > 0) {
    pendingBanner = h("div", { style:{
      background:"linear-gradient(90deg,#7c5fc7,#5b8dee)", padding:"9px 20px",
      fontSize:12, display:"flex", alignItems:"center", gap:10
    }},
      h("span", { className:"spin" }, "◌"),
      h("span", {}, state.pending.length+" Dokument"+(state.pending.length>1?"e werden":"  wird")+" analysiert…"),
      h("span", { style:{ marginLeft:"auto", fontSize:10, color:"rgba(255,255,255,.5)" }},
        state.pending.join(", ").substring(0,60)+(state.pending.join(", ").length>60?"…":""))
    );
  }

  // Doc list / folder view
  let content;
  if (state.view === "ordner") {
    content = h("div", { style:{ flex:1, overflowY:"auto" }}, FolderView(filtered));
  } else if (filtered.length > 0) {
    const tableHead = h("div", { style:{
      display:"grid", gridTemplateColumns:"22px 1fr 140px 100px 110px 90px",
      gap:10, padding:"6px 12px", fontSize:9, color:"#2a2a2a", letterSpacing:1.5,
      borderBottom:"1px solid #141414"
    }},
      h("span",{}), h("span",{},"DATEINAME"), h("span",{},"ABSENDER"), h("span",{},"DATUM"), h("span",{},"BETRAG"), h("span",{},"")
    );
    const rows = h("div", {}, tableHead, ...filtered.map(DocRow));
    content = h("div", { style:{ flex:1, overflowY:"auto", padding:"8px 20px" }}, rows);
  } else {
    content = h("div", { style:{
      flex:1, display:"flex", alignItems:"center", justifyContent:"center",
      color:"#1e1e1e", fontSize:12
    }}, state.docs.length > 0 ? "Keine Dokumente für diese Filter" : "Noch keine Dokumente im Archiv");
  }

  const main = h("div", { style:{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }},
    toolbar,
    ...(pendingBanner ? [pendingBanner] : []),
    content
  );

  const layout = h("div", { style:{ display:"flex", height:"calc(100vh - 113px)" }}, sidebar, main);

  app.appendChild(header);
  app.appendChild(statBar);
  app.appendChild(layout);
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadDocs();
setInterval(() => {
  // Nur pending/status pollen wenn Dokumente im Eingang
  fetch("/api/pending").then(r=>r.json()).then(p => {
    if (p.length !== state.pending.length) loadDocs();
    else if (p.length > 0) setState({ pending: p });
  });
}, 4000);
setInterval(() => {
  fetch("/api/status").then(r=>r.json()).then(s => {
    const active = s.scanner === "active";
    if (active !== state.scannerActive) setState({ scannerActive: active });
  });
}, 30000);
</script>
</body>
</html>

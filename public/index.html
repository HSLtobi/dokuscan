<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DokuScan</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #5b8dee;
      --accent2: #7c5fc7;
      --text: #e2e8f0;
      --muted: #6b7280;
      --success: #34d399;
      --warning: #fbbf24;
      --danger: #f87171;
    }

    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: var(--bg); color: var(--text); min-height: 100vh; }

    /* HEADER */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex; align-items: center; gap: 16px; height: 60px;
    }
    .logo { font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
    .logo span { color: var(--text); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
    .status-dot.active { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-label { font-size: 12px; color: var(--muted); }
    .pending-badge {
      margin-left: auto; background: var(--accent2); color: #fff;
      font-size: 12px; padding: 2px 10px; border-radius: 12px;
      display: none;
    }
    .pending-badge.visible { display: block; }

    /* LAYOUT */
    .layout { display: flex; height: calc(100vh - 60px); }

    /* SIDEBAR */
    aside {
      width: 200px; flex-shrink: 0;
      background: var(--surface); border-right: 1px solid var(--border);
      padding: 16px 0; overflow-y: auto;
    }
    .sidebar-title { font-size: 11px; font-weight: 600; color: var(--muted);
                     text-transform: uppercase; letter-spacing: 1px; padding: 0 16px 8px; }
    .cat-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; cursor: pointer; border-radius: 0;
      font-size: 14px; color: var(--muted); transition: all .15s;
      border-left: 3px solid transparent;
    }
    .cat-item:hover { background: var(--surface2); color: var(--text); }
    .cat-item.active { background: var(--surface2); color: var(--accent);
                       border-left-color: var(--accent); }
    .cat-count { font-size: 11px; background: var(--surface2); padding: 1px 7px;
                 border-radius: 10px; color: var(--muted); }
    .cat-item.active .cat-count { background: var(--accent); color: #fff; }

    /* MAIN */
    main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .toolbar {
      padding: 16px 24px; display: flex; gap: 12px; align-items: center;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .search {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 14px; color: var(--text); font-size: 14px;
      outline: none;
    }
    .search:focus { border-color: var(--accent); }
    .search::placeholder { color: var(--muted); }

    select.year-filter {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 12px; color: var(--text);
      font-size: 14px; cursor: pointer; outline: none;
    }
    select.year-filter:focus { border-color: var(--accent); }

    .doc-count { font-size: 13px; color: var(--muted); white-space: nowrap; }

    /* DOCUMENT LIST */
    .doc-list { flex: 1; overflow-y: auto; padding: 16px 24px; }

    .doc-item {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px; margin-bottom: 8px;
      transition: border-color .15s, background .15s;
    }
    .doc-item:hover { border-color: var(--accent); background: var(--surface2); }

    .doc-icon { font-size: 28px; flex-shrink: 0; }
    .doc-info { flex: 1; min-width: 0; }
    .doc-name { font-size: 14px; font-weight: 500; color: var(--text);
                white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .kat-badge {
      font-size: 11px; padding: 3px 10px; border-radius: 12px;
      font-weight: 600; flex-shrink: 0; white-space: nowrap;
    }
    .doc-dl {
      background: var(--accent); color: #fff; border: none; border-radius: 7px;
      padding: 7px 14px; font-size: 13px; cursor: pointer; flex-shrink: 0;
      text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
    }
    .doc-dl:hover { background: #4a7be0; }

    /* KAT COLORS */
    .kat-Rechnung      { background: #1e3a5f; color: #60a5fa; }
    .kat-Vertrag       { background: #1a3a2a; color: #34d399; }
    .kat-Kontoauszug   { background: #3a2a1a; color: #fbbf24; }
    .kat-Versicherung  { background: #2a1a3a; color: #c084fc; }
    .kat-Brief         { background: #3a1a1a; color: #f87171; }
    .kat-Steuer        { background: #1a2a3a; color: #38bdf8; }
    .kat-Behoerde      { background: #2a2a1a; color: #a3e635; }
    .kat-Medizin       { background: #3a1a2a; color: #fb7185; }
    .kat-Sonstiges     { background: #252535; color: #94a3b8; }

    /* EMPTY STATE */
    .empty { text-align: center; padding: 80px 24px; color: var(--muted); }
    .empty-icon { font-size: 56px; margin-bottom: 16px; }
    .empty-text { font-size: 16px; }

    /* PENDING OVERLAY */
    .pending-bar {
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      padding: 10px 24px; font-size: 13px; display: none; align-items: center; gap: 10px;
    }
    .pending-bar.visible { display: flex; }
    .spinner {
      width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>

<header>
  <div class="logo">Doku<span>Scan</span></div>
  <div class="status-dot" id="statusDot"></div>
  <div class="status-label" id="statusLabel">Prüfe...</div>
  <div class="pending-badge" id="pendingBadge"></div>
</header>

<div class="pending-bar" id="pendingBar">
  <div class="spinner"></div>
  <span id="pendingText">Dokumente werden verarbeitet...</span>
</div>

<div class="layout">
  <aside>
    <div class="sidebar-title">Kategorien</div>
    <div id="sidebar"></div>
  </aside>

  <main>
    <div class="toolbar">
      <input class="search" type="text" id="search" placeholder="Suche nach Name, Absender…">
      <select class="year-filter" id="yearFilter">
        <option value="">Alle Jahre</option>
      </select>
      <div class="doc-count" id="docCount"></div>
    </div>
    <div class="doc-list" id="docList"></div>
  </main>
</div>

<script>
const ICONS = {
  Rechnung:'🧾', Vertrag:'📋', Kontoauszug:'💳', Versicherung:'🛡️',
  Brief:'✉️', Steuer:'📊', Behoerde:'🏛️', Medizin:'🩺', Sonstiges:'📄'
};

let allDocs = [];
let activeKat = 'Alle';

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

async function loadDocuments() {
  const res  = await fetch('/api/documents');
  allDocs    = await res.json();
  buildSidebar();
  buildYearFilter();
  renderDocs();
}

function buildSidebar() {
  const counts = { Alle: allDocs.length };
  for (const d of allDocs) counts[d.kategorie] = (counts[d.kategorie] || 0) + 1;

  const kats = ['Alle', ...Object.keys(ICONS).filter(k => counts[k])];
  const sb = document.getElementById('sidebar');
  sb.innerHTML = kats.map(k => `
    <div class="cat-item ${k === activeKat ? 'active' : ''}" onclick="setKat('${k}')">
      <span>${k === 'Alle' ? '📂 Alle' : (ICONS[k]||'📄') + ' ' + k}</span>
      <span class="cat-count">${counts[k] || 0}</span>
    </div>`).join('');
}

function buildYearFilter() {
  const years = [...new Set(allDocs.map(d => d.datum?.substring(0,4)).filter(Boolean))].sort((a,b)=>b-a);
  const sel = document.getElementById('yearFilter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Alle Jahre</option>' +
    years.map(y => `<option value="${y}" ${y===cur?'selected':''}>${y}</option>`).join('');
}

function setKat(k) {
  activeKat = k;
  buildSidebar();
  renderDocs();
}

function renderDocs() {
  const search = document.getElementById('search').value.toLowerCase();
  const year   = document.getElementById('yearFilter').value;

  const filtered = allDocs.filter(d => {
    if (activeKat !== 'Alle' && d.kategorie !== activeKat) return false;
    if (year && (!d.datum || !d.datum.startsWith(year))) return false;
    if (search && !d.name.toLowerCase().includes(search)) return false;
    return true;
  });

  document.getElementById('docCount').textContent = `${filtered.length} Dokument${filtered.length !== 1 ? 'e' : ''}`;

  const list = document.getElementById('docList');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div>
      <div class="empty-text">Keine Dokumente gefunden</div></div>`;
    return;
  }

  list.innerHTML = filtered.map(d => `
    <div class="doc-item">
      <div class="doc-icon">${ICONS[d.kategorie]||'📄'}</div>
      <div class="doc-info">
        <div class="doc-name">${d.name}</div>
        <div class="doc-meta">${d.datum || '—'} &nbsp;·&nbsp; ${formatSize(d.size)}</div>
      </div>
      <span class="kat-badge kat-${d.kategorie}">${d.kategorie}</span>
      <a class="doc-dl" href="/api/download/${d.id}" download>⬇ Download</a>
    </div>`).join('');
}

async function checkStatus() {
  try {
    const res  = await fetch('/api/status');
    const data = await res.json();
    const dot  = document.getElementById('statusDot');
    const lbl  = document.getElementById('statusLabel');
    if (data.scanner === 'active') {
      dot.className = 'status-dot active';
      lbl.textContent = 'Scanner aktiv';
    } else {
      dot.className = 'status-dot';
      lbl.textContent = 'Scanner inaktiv';
    }
  } catch { /* ignore */ }
}

async function checkPending() {
  try {
    const res   = await fetch('/api/pending');
    const files = await res.json();
    const bar   = document.getElementById('pendingBar');
    const badge = document.getElementById('pendingBadge');
    if (files.length > 0) {
      bar.className   = 'pending-bar visible';
      badge.className = 'pending-badge visible';
      badge.textContent = `${files.length} wird verarbeitet`;
      document.getElementById('pendingText').textContent =
        `${files.length} Dokument${files.length>1?'e werden':' wird'} analysiert…`;
    } else {
      bar.className   = 'pending-bar';
      badge.className = 'pending-badge';
      loadDocuments(); // neu laden wenn Eingang leer
    }
  } catch { /* ignore */ }
}

document.getElementById('search').addEventListener('input', renderDocs);
document.getElementById('yearFilter').addEventListener('change', renderDocs);

// Init
loadDocuments();
checkStatus();
setInterval(checkStatus, 30000);
setInterval(checkPending, 5000);
</script>
</body>
</html>

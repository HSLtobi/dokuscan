<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DokuScan</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #05050a;
      --surface: rgba(255,255,255,.03);
      --surface-hover: rgba(255,255,255,.06);
      --border: rgba(255,255,255,.06);
      --border-bright: rgba(255,255,255,.12);
      --text: #f0ede8;
      --muted: #4a4a5a;
      --accent: #6366f1;
      --accent-glow: rgba(99,102,241,.25);
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 2px; }

    /* ── Layout ── */
    .shell { display: grid; grid-template-rows: 56px 1px auto auto 1fr; height: 100vh; }
    .content { display: grid; grid-template-columns: 220px 1px 1fr; flex: 1; overflow: hidden; height: 100%; }
    .divider { background: var(--border); }

    /* ── Top bar ── */
    .topbar {
      display: flex; align-items: center; gap: 16px;
      padding: 0 24px; border-bottom: 1px solid var(--border);
      background: rgba(5,5,10,.8); backdrop-filter: blur(20px);
      position: sticky; top: 0; z-index: 10;
    }
    .logo {
      font-size: 15px; font-weight: 700; letter-spacing: -.3px;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .status-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 20px;
      border: 1px solid var(--border); font-size: 11px; color: var(--muted);
    }
    .status-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
    .status-pill.on .dot { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .status-pill.on { color: var(--green); border-color: rgba(34,197,94,.2); }

    .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 500;
      cursor: pointer; border: none; font-family: inherit; transition: all .15s;
    }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface-hover); color: var(--text); border-color: var(--border-bright); }
    .btn-accent { background: var(--accent); color: #fff; box-shadow: 0 0 20px var(--accent-glow); }
    .btn-accent:hover { filter: brightness(1.1); }
    .btn-zip { background: rgba(245,158,11,.1); color: var(--amber); border: 1px solid rgba(245,158,11,.2); }
    .btn-zip:hover { background: rgba(245,158,11,.2); }
    .btn-log { background: rgba(239,68,68,.08); color: var(--red); border: 1px solid rgba(239,68,68,.2); }
    .btn-log:hover { background: rgba(239,68,68,.15); }

    /* ── Queue-Banner ── */
    .queue-banner {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 24px; font-size: 12px;
      background: linear-gradient(90deg, rgba(34,197,94,.1), rgba(34,197,94,.04));
      border-bottom: 1px solid rgba(34,197,94,.15);
    }
    .queue-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: qpulse 1.4s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes qpulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.7)} }
    .queue-file { color: var(--muted); max-width: 260px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Stat bar ── */
    .statbar {
      display: flex; align-items: center; gap: 0;
      padding: 0 24px; background: rgba(255,255,255,.015);
      border-bottom: 1px solid var(--border);
    }
    .stat { display: flex; align-items: baseline; gap: 8px; padding: 12px 24px 12px 0; }
    .stat-val { font-size: 24px; font-weight: 700; letter-spacing: -1px; }
    .stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .stat-sep { width: 1px; height: 24px; background: var(--border); margin: 0 24px 0 0; }
    .prog-wrap { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .prog-bar { width: 140px; height: 2px; background: rgba(255,255,255,.06); border-radius: 1px; overflow: hidden; }
    .prog-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 1px; transition: width .5s ease; }
    .prog-pct { font-size: 11px; color: var(--muted); min-width: 32px; text-align: right; }

    /* ── Sidebar ── */
    .sidebar { overflow-y: auto; padding: 16px 0; }
    .sidebar-title { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; padding: 0 16px 10px; }
    .cat-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px; cursor: pointer; font-size: 12px; color: var(--muted);
      border-left: 2px solid transparent; transition: all .12s; position: relative;
    }
    .cat-item:hover { background: var(--surface-hover); color: var(--text); }
    .cat-item.active { background: var(--surface); color: var(--text); }
    .cat-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .cat-count { margin-left: auto; font-size: 10px; color: var(--muted); }
    .cat-item.active .cat-count { color: var(--text); }

    /* ── Main panel ── */
    .main { display: flex; flex-direction: column; overflow: hidden; }

    /* Toolbar */
    .toolbar { display: flex; align-items: center; gap: 10px; padding: 12px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .search-wrap { flex: 1; position: relative; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }
    .search-input {
      width: 100%; padding: 8px 12px 8px 34px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface);
      font-size: 12px; color: var(--text); font-family: inherit; outline: none;
      transition: border-color .15s;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--accent); background: rgba(99,102,241,.04); }
    .year-sel {
      padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface); font-size: 12px; color: var(--text); font-family: inherit;
      outline: none; cursor: pointer;
    }
    .view-toggle { display: flex; background: rgba(255,255,255,.04); border-radius: 8px; padding: 3px; gap: 2px; }
    .view-btn {
      padding: 5px 12px; border-radius: 6px; font-size: 11px; border: none;
      font-family: inherit; cursor: pointer; color: var(--muted); background: transparent; transition: all .12s;
    }
    .view-btn.active { background: rgba(255,255,255,.08); color: var(--text); }
    .doc-count { font-size: 11px; color: var(--muted); white-space: nowrap; padding: 0 4px; }

    /* Processing banner */
    .processing-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 20px; font-size: 12px;
      background: linear-gradient(90deg, rgba(99,102,241,.12), rgba(99,102,241,.04));
      border-bottom: 1px solid rgba(99,102,241,.15);
    }
    .processing-spinner { width: 14px; height: 14px; border: 1.5px solid rgba(99,102,241,.3); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Doc list */
    .doc-list { flex: 1; overflow-y: auto; padding: 0; }
    .list-head {
      display: grid; grid-template-columns: 40px 1fr 160px 100px 100px 80px 100px;
      gap: 12px; padding: 8px 20px; font-size: 10px; color: var(--muted);
      letter-spacing: 1px; text-transform: uppercase; position: sticky; top: 0;
      background: rgba(5,5,10,.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); z-index: 2;
    }
    .doc-row {
      display: grid; grid-template-columns: 40px 1fr 160px 100px 100px 80px 100px;
      gap: 12px; padding: 10px 20px; align-items: center;
      border-bottom: 1px solid var(--border); transition: background .1s; cursor: default;
    }
    .doc-row:hover { background: var(--surface-hover); }
    .doc-icon {
      width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center;
      justify-content: center; font-size: 14px; flex-shrink: 0;
    }
    .doc-name-text {
      font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: pointer; border-radius: 4px; padding: 2px 4px; margin: -2px -4px; transition: background .1s;
    }
    .doc-name-text:hover { background: rgba(255,255,255,.05); }
    .doc-sub { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .col-text { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .col-amount { font-size: 12px; font-weight: 500; color: var(--amber); }
    .col-pages { font-size: 11px; color: var(--muted); }
    .col-dl { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
    .dl-link {
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      border-radius: 7px; border: 1px solid var(--border); color: var(--muted);
      text-decoration: none; font-size: 13px; transition: all .12s;
    }
    .dl-link:hover { background: var(--surface-hover); color: var(--text); border-color: var(--border-bright); }

    /* Inline edit */
    .name-edit-input {
      width: 100%; background: rgba(99,102,241,.08); border: 1px solid var(--accent);
      border-radius: 4px; color: var(--text); font-family: inherit; font-size: 12px;
      font-weight: 500; padding: 2px 6px; outline: none;
    }

    /* Kat select inline */
    .kat-sel {
      font-family: inherit; font-size: 10px; border-radius: 6px; padding: 3px 6px;
      border: 1px solid; background: transparent; cursor: pointer; outline: none;
      font-weight: 500; letter-spacing: .3px;
    }

    /* Empty state */
    .empty {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; color: var(--muted);
    }
    .empty-icon { font-size: 40px; opacity: .3; }
    .empty-text { font-size: 13px; }

    /* Initial load skeleton */
    .skeleton-wrap { flex: 1; display: flex; flex-direction: column; gap: 1px; padding: 0; }
    .skeleton-row { display: flex; align-items: center; gap: 12px; padding: 10px 20px; border-bottom: 1px solid var(--border); }
    .skel { background: rgba(255,255,255,.04); border-radius: 4px; animation: shimmer 1.4s ease-in-out infinite; }
    @keyframes shimmer { 0%,100%{opacity:.4} 50%{opacity:.8} }

    /* Drop overlay */
    #dropOverlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(5,5,10,.88); backdrop-filter: blur(12px);
      flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      pointer-events: none;
    }
    #dropOverlay.on { display: flex; }
    .drop-ring {
      width: 120px; height: 120px; border-radius: 50%;
      border: 2px dashed var(--accent); display: flex; align-items: center; justify-content: center;
      font-size: 36px; animation: pulse 1.5s ease-in-out infinite;
      box-shadow: 0 0 40px var(--accent-glow);
    }
    @keyframes pulse { 0%,100%{opacity:.7;transform:scale(1)} 50%{opacity:1;transform:scale(1.05)} }
    .drop-text { font-size: 16px; font-weight: 600; color: var(--accent); }
    .drop-sub { font-size: 12px; color: var(--muted); }

    /* Folder view */
    .folder-grid { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; align-content: start; }
    .folder-card {
      border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
      background: var(--surface); transition: border-color .15s;
    }
    .folder-card:hover { border-color: var(--border-bright); }
    .folder-card-head {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; border-bottom: 1px solid var(--border);
    }
    .folder-card-name { font-size: 12px; font-weight: 600; }
    .folder-card-count { margin-left: auto; font-size: 10px; color: var(--muted); }
    .folder-file {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px; font-size: 11px; color: var(--muted);
      border-bottom: 1px solid var(--border); text-decoration: none; transition: background .1s;
    }
    .folder-file:last-child { border-bottom: none; }
    .folder-file:hover { background: var(--surface-hover); color: var(--text); }
    .folder-file-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── PDF Preview Modal ── */
    .pdf-overlay {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,.85); backdrop-filter: blur(8px);
      align-items: center; justify-content: center;
      opacity: 0; transition: opacity .2s ease;
    }
    .pdf-overlay.open { display: flex; }
    .pdf-overlay.visible { opacity: 1; }
    .pdf-modal {
      background: #0d0d1a; border: 1px solid #2a2a4a;
      border-radius: 12px; width: 90vw; height: 90vh;
      display: flex; flex-direction: column; overflow: hidden;
      transform: scale(0.95); transition: transform .2s ease;
    }
    .pdf-overlay.visible .pdf-modal { transform: scale(1); }
    .pdf-modal-head {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-bottom: 1px solid #2a2a4a; flex-shrink: 0;
    }
    .pdf-modal-title {
      font-size: 13px; font-weight: 500; flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--text);
    }
    .pdf-modal-close {
      width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-family: inherit;
      transition: all .12s; flex-shrink: 0;
    }
    .pdf-modal-close:hover { background: var(--surface-hover); color: var(--text); }
    .pdf-modal-body { flex: 1; overflow: hidden; }
    .pdf-modal-body iframe {
      width: 100%; height: 100%; border: none; display: block;
    }

    /* ── Log Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.7); backdrop-filter: blur(8px);
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #0d0d16; border: 1px solid var(--border-bright);
      border-radius: 16px; width: 760px; max-width: 95vw; max-height: 80vh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .modal-title { font-size: 14px; font-weight: 600; }
    .modal-close {
      width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-family: inherit;
      transition: all .12s;
    }
    .modal-close:hover { background: var(--surface-hover); color: var(--text); }
    .modal-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
    .log-line {
      font-family: 'Menlo', 'Consolas', monospace; font-size: 11px;
      color: var(--muted); padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,.02);
      line-height: 1.5;
    }
    .log-line.error { color: var(--red); }
    .log-empty { font-size: 13px; color: var(--muted); text-align: center; padding: 40px; }
  </style>
</head>
<body>

<div id="dropOverlay">
  <div class="drop-ring">⬆</div>
  <div class="drop-text">Dateien ablegen</div>
  <div class="drop-sub">PDF · JPG · PNG · TIFF · WEBP</div>
</div>

<div id="logModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">Fehlerlog</span>
      <button class="modal-close" id="modalCloseBtn">✕</button>
    </div>
    <div class="modal-body" id="logModalBody">
      <div class="log-empty">Lade…</div>
    </div>
  </div>
</div>

<div id="pdfModal" class="pdf-overlay">
  <div class="pdf-modal" id="pdfModalBox">
    <div class="pdf-modal-head">
      <span class="pdf-modal-title" id="pdfModalTitle"></span>
      <button class="pdf-modal-close" id="pdfModalClose">✕</button>
    </div>
    <div class="pdf-modal-body">
      <iframe id="pdfModalFrame" src="" title="PDF Vorschau"></iframe>
    </div>
  </div>
</div>

<div id="app"></div>

<script>
const CATS = {
  Rechnung:    { color: '#f59e0b', bg: 'rgba(245,158,11,.12)', emoji: '🧾' },
  Vertrag:     { color: '#6366f1', bg: 'rgba(99,102,241,.12)',  emoji: '📋' },
  Kontoauszug: { color: '#22c55e', bg: 'rgba(34,197,94,.12)',   emoji: '💳' },
  Versicherung:{ color: '#8b5cf6', bg: 'rgba(139,92,246,.12)',  emoji: '🛡️' },
  Brief:       { color: '#ec4899', bg: 'rgba(236,72,153,.12)',  emoji: '✉️' },
  Steuer:      { color: '#ef4444', bg: 'rgba(239,68,68,.12)',   emoji: '📊' },
  Behoerde:    { color: '#f97316', bg: 'rgba(249,115,22,.12)',  emoji: '🏛️' },
  Medizin:     { color: '#06b6d4', bg: 'rgba(6,182,212,.12)',   emoji: '🩺' },
  Sonstiges:   { color: '#6b7280', bg: 'rgba(107,114,128,.12)', emoji: '📄' },
};
const CAT_KEYS = Object.keys(CATS);

let S = {
  docs: [], pending: [], active: false,
  kat: 'Alle', view: 'liste', q: '', year: '', editing: null,
  loading: true,
  queueLength: 0, currentFile: null, errorCount: 0, processedToday: 0,
};
function set(p) { Object.assign(S, p); render(); }

// ── API ───────────────────────────────────────────────────────────────────────
async function load() {
  const [d,p,s] = await Promise.all([
    fetch('/api/documents'),
    fetch('/api/pending'),
    fetch('/api/status'),
  ]);
  const status = await s.json();
  set({
    docs: await d.json(),
    pending: await p.json(),
    active: status.scanner === 'active',
    queueLength:    status.queueLength    || 0,
    currentFile:    status.currentFile    || null,
    errorCount:     status.errorCount     || 0,
    processedToday: status.processedToday || 0,
    loading: false,
  });
}

async function pollStatus() {
  try {
    const s = await fetch('/api/status').then(r => r.json());
    const prev = S.queueLength;
    set({
      active:         s.scanner === 'active',
      queueLength:    s.queueLength    || 0,
      currentFile:    s.currentFile    || null,
      errorCount:     s.errorCount     || 0,
      processedToday: s.processedToday || 0,
    });
    // Wenn Queue gerade leer wurde → Dokumente neu laden
    if (prev > 0 && (s.queueLength || 0) === 0) load();
  } catch {}
}

async function upload(files) {
  const fd = new FormData();
  for (const f of files) fd.append('files', f);
  await fetch('/api/upload', { method: 'POST', body: fd });
  load();
}
async function rename(id, newName) {
  const r = await fetch(`/api/rename/${id}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ newName }) });
  if (!r.ok) { alert('Fehler beim Umbenennen'); return; }
  const u = await r.json();
  set({ docs: S.docs.map(d => d.id === id ? u : d), editing: null });
}
async function changeKat(id, newKat) {
  const r = await fetch(`/api/kategorize/${id}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ newKat }) });
  if (!r.ok) { alert('Fehler'); return; }
  const u = await r.json();
  set({ docs: S.docs.map(d => d.id === id ? u : d) });
}

// ── PDF Preview Modal ─────────────────────────────────────────────────────────
async function reanalyzeDoc(id, name) {
  if (!confirm(`"${name}" neu analysieren? Die KI liest das Dokument erneut.`)) return;
  const btn = document.querySelector(`button[data-reanalyze="${id}"]`);
  if (btn) btn.textContent = '⏳';
  try {
    const r = await fetch('/api/reanalyze/' + id, { method: 'POST' });
    const data = await r.json();
    if (data.ok) {
      if (btn) btn.textContent = '✅';
      setTimeout(() => { loadDocs(); }, 800);
    } else {
      if (btn) btn.textContent = '❌';
      alert('Fehler: ' + (data.error || 'Unbekannt'));
    }
  } catch (e) {
    if (btn) btn.textContent = '❌';
    alert('Netzwerkfehler: ' + e.message);
  }
}

function openPreview(id, name) {
  const overlay = document.getElementById('pdfModal');
  document.getElementById('pdfModalTitle').textContent = name;
  document.getElementById('pdfModalFrame').src = '/api/preview/' + id;
  overlay.classList.add('open');
  requestAnimationFrame(() => requestAnimationFrame(() => overlay.classList.add('visible')));
}

function closePreview() {
  const overlay = document.getElementById('pdfModal');
  overlay.classList.remove('visible');
  setTimeout(() => {
    overlay.classList.remove('open');
    document.getElementById('pdfModalFrame').src = '';
  }, 200);
}

document.getElementById('pdfModalClose').addEventListener('click', closePreview);
document.getElementById('pdfModal').addEventListener('click', e => {
  if (e.target === document.getElementById('pdfModal')) closePreview();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('pdfModal').classList.contains('open')) closePreview();
});

// ── Log Modal ─────────────────────────────────────────────────────────────────
async function openLogModal() {
  document.getElementById('logModal').classList.add('open');
  document.getElementById('logModalBody').innerHTML = '<div class="log-empty">Lade…</div>';
  try {
    const data = await fetch('/api/logs').then(r => r.json());
    const body = document.getElementById('logModalBody');
    body.innerHTML = '';
    if (!data.lines || data.lines.length === 0) {
      body.innerHTML = '<div class="log-empty">Keine Einträge</div>';
      return;
    }
    for (const line of data.lines) {
      const el = document.createElement('div');
      el.className = 'log-line' + (line.toLowerCase().includes('error') || line.toLowerCase().includes('fehler') ? ' error' : '');
      el.textContent = line;
      body.appendChild(el);
    }
    body.scrollTop = body.scrollHeight;
  } catch {
    document.getElementById('logModalBody').innerHTML = '<div class="log-empty">Fehler beim Laden</div>';
  }
}

document.getElementById('modalCloseBtn').addEventListener('click', () => {
  document.getElementById('logModal').classList.remove('open');
});
document.getElementById('logModal').addEventListener('click', e => {
  if (e.target === document.getElementById('logModal'))
    document.getElementById('logModal').classList.remove('open');
});

// ── Computed ──────────────────────────────────────────────────────────────────
function vis() {
  return S.docs.filter(d => {
    if (S.kat !== 'Alle' && d.kategorie !== S.kat) return false;
    if (S.year && (!d.datum || !d.datum.startsWith(S.year))) return false;
    if (S.q.trim()) {
      const q = S.q.toLowerCase();
      if (!d.name.toLowerCase().includes(q) && !(d.absender||'').toLowerCase().includes(q)) return false;
    }
    return true;
  });
}
function getYears() { return [...new Set(S.docs.map(d => d.datum?.slice(0,4)).filter(Boolean))].sort((a,b) => b-a); }
function getCounts() { const c = { Alle: S.docs.length }; for (const d of S.docs) c[d.kategorie] = (c[d.kategorie]||0) + 1; return c; }
function fmt(b) { if (b < 1024) return b+' B'; if (b < 1048576) return (b/1024).toFixed(1)+' KB'; return (b/1048576).toFixed(1)+' MB'; }

// ── DOM ───────────────────────────────────────────────────────────────────────
const SVG_NS = 'http://www.w3.org/2000/svg';
const SVG_TAGS = new Set(['svg','circle','ellipse','path','rect','line','polyline','polygon','g','defs','use','symbol','text','tspan']);
function h(tag, attrs, ...kids) {
  const el = SVG_TAGS.has(tag)
    ? document.createElementNS(SVG_NS, tag)
    : document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'cls') el.className = v;
    else el.setAttribute(k, v);
  }
  for (const c of kids.flat()) if (c != null) el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  return el;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  const docs = vis(), yrs = getYears(), counts = getCounts();
  const done = S.docs.length, busy = S.pending.length, pct = done+busy > 0 ? Math.round(done/(done+busy)*100) : 100;

  // ── Topbar ──
  const fileInput = h('input', { type:'file', accept:'.pdf,.jpg,.jpeg,.png,.tiff,.tif,.webp', multiple:true, style:{display:'none'},
    onChange: e => { if (e.target.files.length) upload(Array.from(e.target.files)); e.target.value = ''; }
  });

  const topbar = h('div', { cls:'topbar' },
    h('div', { cls:'logo' }, 'DokuScan'),
    h('div', { cls:`status-pill${S.active?' on':''}` },
      h('div', { cls:'dot' }),
      S.active ? 'Scanner aktiv' : 'Scanner inaktiv'
    ),
    h('div', { cls:'topbar-actions' },
      h('label', { style:{ cursor:'pointer' } },
        fileInput,
        h('span', { cls:'btn btn-ghost', onClick:()=>fileInput.click() }, '⬆ Upload')
      ),
      h('div', { cls:'view-toggle' },
        h('button', { cls:`view-btn${S.view==='liste'?' active':''}`, onClick:()=>set({view:'liste'}) }, 'Liste'),
        h('button', { cls:`view-btn${S.view==='ordner'?' active':''}`, onClick:()=>set({view:'ordner'}) }, 'Ordner')
      ),
      h('button', { cls:'btn btn-zip', onClick:() => {
        const p = new URLSearchParams();
        if (S.kat !== 'Alle') p.set('kat', S.kat);
        if (S.year) p.set('year', S.year);
        const qs = p.toString(); window.location = '/api/export-zip' + (qs ? '?'+qs : '');
      }}, '⬇ ZIP'),
      h('button', { cls:'btn btn-log', onClick: openLogModal }, '⚠ Fehlerlog')
    )
  );

  // ── Queue-Banner ──
  let queueBanner = null;
  if (S.queueLength > 0 || S.currentFile) {
    const qLen = S.queueLength;
    const label = qLen > 0 ? `Verarbeite ${qLen} Dokument${qLen > 1 ? 'e' : ''}…` : 'Verarbeite…';
    queueBanner = h('div', { cls:'queue-banner' },
      h('div', { cls:'queue-dot' }),
      h('span', { style:{ color:'#22c55e', fontWeight:500 } }, label),
      S.currentFile ? h('span', { cls:'queue-file' }, S.currentFile) : null
    );
  }

  // ── StatBar ──
  const statbar = h('div', { cls:'statbar' },
    h('div', { cls:'stat' }, h('span', { cls:'stat-val', style:{ color:'#22c55e' } }, String(done)), h('span', { cls:'stat-lbl' }, 'Archiviert')),
    h('div', { cls:'stat-sep' }),
    h('div', { cls:'stat' }, h('span', { cls:'stat-val', style:{ color:busy>0?'#f59e0b':'#2a2a3a' } }, String(busy)), h('span', { cls:'stat-lbl' }, 'In Eingang')),
    h('div', { cls:'stat-sep' }),
    h('div', { cls:'stat' }, h('span', { cls:'stat-val', style:{ color:'#6366f1' } }, String(CAT_KEYS.filter(k=>counts[k]).length)), h('span', { cls:'stat-lbl' }, 'Kategorien')),
    S.processedToday > 0 ? h('div', { cls:'stat-sep' }) : null,
    S.processedToday > 0 ? h('div', { cls:'stat' }, h('span', { cls:'stat-val', style:{ color:'#06b6d4' } }, String(S.processedToday)), h('span', { cls:'stat-lbl' }, 'Heute')) : null,
    S.errorCount > 0 ? h('div', { cls:'stat-sep' }) : null,
    S.errorCount > 0 ? h('div', { cls:'stat' }, h('span', { cls:'stat-val', style:{ color:'var(--red)' } }, String(S.errorCount)), h('span', { cls:'stat-lbl' }, 'Fehler')) : null,
    h('div', { cls:'prog-wrap' },
      h('div', { cls:'prog-bar' }, h('div', { cls:'prog-fill', style:{ width:pct+'%' } })),
      h('span', { cls:'prog-pct' }, pct+'%')
    )
  );

  // ── Sidebar ──
  const sidebar = h('div', { cls:'sidebar' });
  sidebar.appendChild(h('div', { cls:'sidebar-title' }, 'Kategorien'));
  for (const cat of ['Alle', ...CAT_KEYS.filter(k => counts[k])]) {
    const info = CATS[cat], active = S.kat === cat, cnt = counts[cat] || 0;
    const item = h('div', { cls:`cat-item${active?' active':''}`, onClick:()=>set({kat:cat}) },
      h('div', { cls:'cat-dot', style:{ background:info?.color||'#6366f1', boxShadow:active?`0 0 6px ${info?.color||'#6366f1'}`:'none' } }),
      h('span', {}, cat),
      cnt > 0 ? h('span', { cls:'cat-count' }, String(cnt)) : null
    );
    if (active) item.style.borderLeftColor = info?.color || '#6366f1';
    sidebar.appendChild(item);
  }

  // ── Main ──
  const qInput = h('input', { cls:'search-input', type:'text', placeholder:'Suche nach Name, Absender…' });
  qInput.value = S.q;
  qInput.addEventListener('input', e => set({ q: e.target.value }));

  const yrSel = h('select', { cls:'year-sel', onChange:e=>set({year:e.target.value}) },
    h('option', { value:'' }, 'Alle Jahre'),
    ...yrs.map(y => { const o = h('option', { value:y }, y); if (y === S.year) o.selected = true; return o; })
  );

  const toolbar = h('div', { cls:'toolbar' },
    h('div', { cls:'search-wrap' }, h('span', { cls:'search-icon' }, '⌕'), qInput),
    yrSel,
    h('span', { cls:'doc-count' }, docs.length+' Dok.')
  );

  let contentEl;

  if (S.loading) {
    const skeletons = Array.from({ length: 8 }).map(() =>
      h('div', { cls:'skeleton-row' },
        h('div', { cls:'skel', style:{ width:'32px', height:'32px', borderRadius:'8px', flexShrink:'0' } }),
        h('div', { style:{ flex:'1', display:'flex', flexDirection:'column', gap:'6px' } },
          h('div', { cls:'skel', style:{ width:'60%', height:'12px' } }),
          h('div', { cls:'skel', style:{ width:'40%', height:'10px' } })
        ),
        h('div', { cls:'skel', style:{ width:'100px', height:'10px' } }),
        h('div', { cls:'skel', style:{ width:'80px', height:'10px' } }),
        h('div', { cls:'skel', style:{ width:'60px', height:'10px' } }),
        h('div', { cls:'skel', style:{ width:'28px', height:'28px', borderRadius:'7px' } })
      )
    );
    contentEl = h('div', { cls:'doc-list skeleton-wrap' }, ...skeletons);
  } else if (S.view === 'ordner') {
    const grid = h('div', { cls:'folder-grid' });
    const byKat = {};
    for (const d of docs) (byKat[d.kategorie] = byKat[d.kategorie] || []).push(d);
    for (const [kat, kd] of Object.entries(byKat)) {
      const info = CATS[kat] || CATS.Sonstiges;
      grid.appendChild(h('div', { cls:'folder-card' },
        h('div', { cls:'folder-card-head', style:{ borderLeftColor:info.color } },
          h('span', { style:{ fontSize:16 } }, info.emoji),
          h('span', { cls:'folder-card-name', style:{ color:info.color } }, kat),
          h('span', { cls:'folder-card-count' }, kd.length)
        ),
        ...kd.map(d => h('div', { cls:'folder-file' },
          h('span', {}, info.emoji),
          h('span', { cls:'folder-file-name' }, d.name),
          h('button', {
            title:'Vorschau',
            style:{ background:'transparent', border:'none', cursor:'pointer', color:'var(--muted)', padding:'2px 4px', borderRadius:'4px', fontSize:'13px', transition:'color .12s' },
            onClick: e => { e.stopPropagation(); openPreview(d.id, d.name); },
            onMouseover: e => e.currentTarget.style.color = 'var(--text)',
            onMouseout:  e => e.currentTarget.style.color = 'var(--muted)',
          }, '👁'),
          h('a', { href:'/api/download/'+d.id, title:'Download', style:{ color:'var(--muted)', textDecoration:'none', padding:'2px 4px', borderRadius:'4px', fontSize:'13px', transition:'color .12s' },
            onMouseover: e => e.currentTarget.style.color = 'var(--text)',
            onMouseout:  e => e.currentTarget.style.color = 'var(--muted)',
          }, '↓')
        ))
      ));
    }
    contentEl = h('div', { cls:'doc-list' }, grid);
  } else if (docs.length) {
    const head = h('div', { cls:'list-head' },
      h('span', {}), h('span', {}, 'Dateiname'), h('span', {}, 'Absender'),
      h('span', {}, 'Datum'), h('span', {}, 'Betrag'), h('span', {}, 'Seiten'), h('span', {})
    );
    const rows = docs.map(doc => {
      const info = CATS[doc.kategorie] || CATS.Sonstiges;
      const isEd = S.editing === doc.id;

      let nameEl;
      if (isEd) {
        const inp = h('input', { cls:'name-edit-input', value:doc.name,
          onKeydown: e => {
            if (e.key === 'Enter') { e.preventDefault(); rename(doc.id, e.target.value); }
            if (e.key === 'Escape') set({ editing: null });
          }
        });
        setTimeout(() => inp.focus(), 30);
        nameEl = h('div', { style:{ minWidth:0 } }, inp, h('div', { cls:'doc-sub' }, '↵ Speichern  ·  Esc Abbrechen'));
      } else {
        nameEl = h('div', { style:{ minWidth:0 } },
          h('div', { cls:'doc-name-text', onClick:()=>set({editing:doc.id}), title:'Klicken zum Umbenennen' }, doc.name),
          doc.zusammenfassung
            ? h('div', { cls:'doc-sub' }, doc.zusammenfassung)
            : h('div', { cls:'doc-sub' }, fmt(doc.size))
        );
      }

      const katSel = h('select', { cls:'kat-sel', style:{ color:info.color, borderColor:info.color+'44', background:info.bg },
        onChange: e => changeKat(doc.id, e.target.value)
      }, ...CAT_KEYS.map(k => { const o = h('option', { value:k }, k); if (k === doc.kategorie) o.selected = true; return o; }));

      return h('div', { cls:'doc-row' },
        h('div', { cls:'doc-icon', style:{ background:info.bg } }, h('span', { style:{ fontSize:16 } }, info.emoji)),
        nameEl,
        h('div', { cls:'col-text' }, doc.absender || '—'),
        h('div', { cls:'col-text' }, doc.datum || '—'),
        doc.betrag ? h('div', { cls:'col-amount' }, doc.betrag) : h('div', { cls:'col-text' }, '—'),
        doc.pages  ? h('div', { cls:'col-pages' }, doc.pages + ' S.') : h('div', { cls:'col-text' }, '—'),
        h('div', { cls:'col-dl' }, katSel,
          h('button', { cls:'dl-link', title:'Vorschau', onClick:()=>openPreview(doc.id, doc.name) }, '👁'),
          (doc.kategorie === 'Sonstiges' || doc.kategorie === 'Pruefen')
            ? h('button', { cls:'dl-link', title:'Neu analysieren', 'data-reanalyze':doc.id, onClick:()=>reanalyzeDoc(doc.id, doc.name) }, '🔄')
            : null,
          h('a', { cls:'dl-link', href:'/api/download/'+doc.id, title:'Download' }, '↓')
        )
      );
    });
    contentEl = h('div', { cls:'doc-list' }, head, ...rows);
  } else {
    contentEl = h('div', { cls:'empty' },
      h('div', { cls:'empty-icon' }, S.docs.length > 0 ? '🔍' : '📂'),
      h('div', { cls:'empty-text' }, S.docs.length > 0 ? 'Keine Treffer — Filter anpassen' : 'Noch keine Dokumente')
    );
  }

  let processingEl = null;
  if (S.pending.length > 0) {
    processingEl = h('div', { cls:'processing-bar' },
      h('div', { cls:'processing-spinner' }),
      h('span', { style:{ color:'#6366f1', fontWeight:500 } }, S.pending.length+' Dok.'),
      h('span', { style:{ color:'var(--muted)' } }, 'werden analysiert…')
    );
  }

  const main = h('div', { cls:'main' }, toolbar, ...(processingEl?[processingEl]:[]), contentEl);

  const shellChildren = [
    topbar,
    h('div', { cls:'divider' }),
    ...(queueBanner ? [queueBanner] : []),
    statbar,
    h('div', { cls:'content' }, sidebar, h('div', { cls:'divider' }), main)
  ];

  // Adjust grid rows when queue banner is shown
  const shell = h('div', { cls:'shell' }, ...shellChildren);
  if (queueBanner) {
    shell.style.gridTemplateRows = '56px 1px auto auto auto 1fr';
  }

  app.appendChild(shell);
}

// ── Drag & Drop ───────────────────────────────────────────────────────────────
const overlay = document.getElementById('dropOverlay');
let dc = 0;
document.addEventListener('dragenter', e => { e.preventDefault(); dc++; overlay.classList.add('on'); });
document.addEventListener('dragleave', () => { if (--dc <= 0) { dc = 0; overlay.classList.remove('on'); } });
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault(); dc = 0; overlay.classList.remove('on');
  const files = Array.from(e.dataTransfer.files).filter(f => /\.(pdf|jpe?g|png|tiff?|webp)$/i.test(f.name));
  if (files.length) upload(files);
});

// ── Poll ──────────────────────────────────────────────────────────────────────
load();

// Status alle 3s pollen (Queue, aktuelles Dokument)
setInterval(pollStatus, 3000);

// Pending-Dateien alle 4s prüfen
setInterval(() => {
  fetch('/api/pending').then(r => r.json()).then(p => {
    if (p.length !== S.pending.length) load();
    else if (p.length > 0) set({ pending: p });
  });
}, 4000);
</script>
</body>
